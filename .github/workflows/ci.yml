name: Exemplo de CI # Nome da ação

on:
  pull_request: # Evento que irá disparar a ação
    branches: 
      - main # Ramo que irá disparar a ação
      - develop
    types: [opened, reopened] # Tipos de evento que irão disparar a ação

jobs: # Trabalhos a serem executados
  build: # Nome do trabalho pode ser qualquer um de sua escolha
    runs-on: ubuntu-latest # Sistema operacional a ser utilizado
    steps: # Passos a serem executados
      - name: Checkout code # Nome do passo, nesse caso, clonar o repositório
        uses: actions/checkout@v4 # action escolhida para clonar o repositório

      - name: Set up JDK 21 # Configurar JDK 21 para alinhar com pom.xml
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Build with Maven (wrapper)
        run: ./mvnw -B package -DskipTests
  test:
    runs-on: ubuntu-latest
    needs: build # Este trabalho depende do trabalho de build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Test with Maven
        run: mvn test

  docker:
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: cynthiangi/ci-exemple:latest